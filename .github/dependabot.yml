version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # eslint-config-next solo declara peer eslint ^7 || ^8 || ^9 (aún no ^10)
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Tailwind v4 exige @tailwindcss/postcss y migrar postcss/globals; no auto-bump desde v3
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
